<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Head Lua - 下载页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        
        .back-button:hover {
            background: #764ba2;
        }
        
        h1 {
            font-size: 36px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #f5576c;
        }
        
        .version {
            color: #999;
            margin-bottom: 30px;
        }
        
        .description {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .description h3 {
            color: #f5576c;
            margin-bottom: 10px;
        }
        
        .features {
            margin: 30px 0;
            padding-left: 20px;
        }
        
        .features li {
            margin: 10px 0;
            line-height: 1.5;
        }
        
        .download-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.3s;
            margin: 20px 0;
        }
        
        .download-btn:hover {
            transform: scale(1.02);
        }
        
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-button">← 返回首页</a>
        
        <h1>🎯 Scout Head Lua</h1>
        <div class="version">版本：v1.0 | 最后更新：2026-01-04</div>
        
        <div class="description">
            <h3>📖 脚本说明</h3>
            <p>Scout Head Lua 是一款专为CS2/CS:GO设计的精准爆头辅助脚本，能够提高Scout狙击枪的爆头率。</p>
        </div>
        
        <h3>✨ 主要功能</h3>
        <ul class="features">
            <li>✓ 自动瞄准头部区域</li>
            <li>✓ 智能预判敌人移动轨迹</li>
            <li>✓ 快速开镜连击模式</li>
            <li>✓ 可调节灵敏度设置</li>
            <li>✓ 低延迟响应机制</li>
        </ul>
        
        <h3>📦 下载文件</h3>
        <a href="#" class="download-btn" id="downloadBtn1">⬇ 下载 Scout Head Lua (scout_head.lua)</a>
        
        <div class="info">
            💡 提示：点击下载按钮即可获取Lua脚本文件。使用前请确保您已安装对应的加载器。
        </div>
    </div>
    
    <script>
        document.getElementById('downloadBtn1').addEventListener('click', function(e) {
            e.preventDefault();
            // 创建Lua文件内容
            const luaContent = `-- Scout Head Lua v1.0
-- 作者：NEVERLOSE Team
-- 功能：Scout狙击枪爆头辅助

local scout_head = {
    enabled = true,
    aim_fov = 30,
    smoothness = 5
}

function on_paint()
    if not scout_head.enabled then return end
    -- 主要的瞄准逻辑
    -- 自动寻找最近的敌人头部
end

function on_shot_fired()
    print("Scout Head Lua 已激活")
end

print("Scout Head Lua 加载成功！")
`;
            
            // 创建Blob并下载
            const blob = new Blob([luaContent], {type: 'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'scout_head.lua';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('开始下载 Scout Head Lua！');
        });
    </script>
</body>
</html>
