<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码验证 - 整合Lua下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
        }
        
        h1 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 0 0 5px #00d4ff;
        }
        
        .question {
            background: rgba(0, 212, 255, 0.1);
            padding: 25px;
            margin: 25px 0;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #ff00aa;
            line-height: 1.6;
        }
        
        .input-area {
            margin: 20px 0;
        }
        
        input {
            width: 250px;
            padding: 12px;
            font-size: 18px;
            background: #111;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            text-align: center;
            font-family: monospace;
            border-radius: 5px;
        }
        
        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00d4ff;
        }
        
        button {
            padding: 12px 25px;
            background: #00d4ff;
            color: #000;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            border-radius: 5px;
            transition: all 0.3s;
            font-family: monospace;
        }
        
        button:hover {
            background: #ff00aa;
            color: #fff;
            transform: scale(1.05);
        }
        
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.3);
            color: #ff6666;
            border: 1px solid #ff0000;
        }
        
        .success {
            background: rgba(0, 255, 0, 0.3);
            color: #00ff41;
            border: 1px solid #00ff41;
        }
        
        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        
        .back-link:hover {
            color: #00d4ff;
        }
        
        .question-stats {
            font-size: 12px;
            color: #00d4ff;
            margin-top: 10px;
        }
        
        .warning-container {
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ff0000;
            border-radius: 15px;
            padding: 50px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
        }
        
        .warning-container h1 {
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000;
        }
        
        .warning-container p {
            color: #fff;
            margin: 30px 0;
            font-size: 18px;
        }
        
        .confirm-btn {
            background: #ff0000;
            color: #fff;
            cursor: pointer;
        }
        
        .confirm-btn:hover {
            background: #00d4ff;
            color: #000;
        }
    </style>
</head>
<body id="mainBody">
    <div id="verifyPage" class="container">
        <h1>🔐 下载验证 - 整合Lua</h1>
        <p style="color: #888; margin-bottom: 10px;">请解答以下题目（七年级难度）</p>
        
        <div class="question" id="question">
            正在生成题目...
        </div>
        
        <div class="input-area">
            <input type="text" id="answer" placeholder="输入答案" autocomplete="off">
            <br>
            <button onclick="checkAnswer()">验证并下载</button>
            <button onclick="resetQuestion()">换一题</button>
        </div>
        
        <div id="message" class="message"></div>
        <div class="hint">💡 提示：密码将在答题正确后显示 | 不等式题填写解集（如 x&lt;3 或 x&gt;5，填写最小整数解）</div>
        <div class="question-stats" id="questionStats"></div>
        <a href="only-scout.html" class="back-link">← 返回上一页</a>
    </div>

    <script>
        // 题库：10道数论填空题 + 10道一元二次不等式（七年级难度）
        const questions = [
            // ========== 数论填空题 (10道，不同题目) ==========
            {
                type: "数论",
                text: "求1到100之间所有偶数的和是多少？",
                answer: "2550"
            },
            {
                type: "数论",
                text: "一个数除以5余2，除以7余3，这个数最小是多少？",
                answer: "17"
            },
            {
                type: "数论",
                text: "求100以内所有能被8整除的数之和？",
                answer: "624"
            },
            {
                type: "数论",
                text: "两个质数的和是30，这两个质数的积最大是多少？",
                answer: "221"
            },
            {
                type: "数论",
                text: "求最小公倍数LCM(6, 10, 15)的值？",
                answer: "30"
            },
            {
                type: "数论",
                text: "一个数既是9的倍数，又是15的倍数，这个数最小是多少？",
                answer: "45"
            },
            {
                type: "数论",
                text: "求1到100之间所有能被4或6整除的数之和？",
                answer: "1254"
            },
            {
                type: "数论",
                text: "两个连续偶数的积是168，求这两个数的和？",
                answer: "26"
            },
            {
                type: "数论",
                text: "求最大公因数GCD(36, 54, 90)的值？",
                answer: "18"
            },
            {
                type: "数论",
                text: "一个数除以4余1，除以7余4，这个数最小是多少？",
                answer: "25"
            },
            
            // ========== 一元二次不等式 (10道，七年级难度，不同题目) ==========
            {
                type: "不等式",
                text: "解不等式：x² - 9x + 18 > 0，求最小整数解？",
                answer: "6"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 5x - 14 < 0，求最大整数解？",
                answer: "6"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 8x + 12 ≤ 0，求整数解的个数？",
                answer: "3"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 4x - 12 ≥ 0，求最小整数解？",
                answer: "6"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 7x + 10 < 0，求整数解之和？",
                answer: "7"
            },
            {
                type: "不等式",
                text: "解不等式：2x² - 7x - 4 > 0，求最小整数解？",
                answer: "4"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 9x + 20 ≤ 0，求整数解的最大值？",
                answer: "5"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 3x - 10 > 0，求最小整数解？",
                answer: "5"
            },
            {
                type: "不等式",
                text: "解不等式：x² - 8x + 15 < 0，求整数解的个数？",
                answer: "2"
            },
            {
                type: "不等式",
                text: "解不等式：2x² - 9x - 5 ≤ 0，求最大整数解？",
                answer: "5"
            }
        ];
        
        let currentQuestion = null;
        let warningActive = false;
        
        // 防作弊检测
        (function() {
            document.addEventListener('keydown', function(e) {
                if (warningActive) return;
                if (e.key === 'F12' || e.keyCode === 123) {
                    e.preventDefault();
                    warningActive = true;
                    showWarning();
                }
            });
        })();
        
        function showWarning() {
            document.body.innerHTML = `
                <div class="warning-container">
                    <h1>⚠️ 警告 ⚠️</h1>
                    <p>请关闭开发者工具后继续验证！</p>
                    <p style="color: #ff6666; font-size: 14px;">请尊重验证流程，不要尝试作弊</p>
                    <button class="confirm-btn" onclick="returnToVerify()">我已知晓，返回验证</button>
                </div>
            `;
            document.body.style.background = "radial-gradient(circle at center, #0a0a2a 0%, #000 100%)";
            document.body.style.minHeight = "100vh";
            document.body.style.display = "flex";
            document.body.style.justifyContent = "center";
            document.body.style.alignItems = "center";
        }
        
        function returnToVerify() {
            window.location.reload();
        }
        
        function getRandomQuestion() {
            const randomIndex = Math.floor(Math.random() * questions.length);
            return questions[randomIndex];
        }
        
        function displayQuestion() {
            currentQuestion = getRandomQuestion();
            document.getElementById('question').innerHTML = currentQuestion.text;
            document.getElementById('answer').value = '';
            document.getElementById('message').style.display = 'none';
            document.getElementById('questionStats').innerHTML = `📐 题库共 ${questions.length} 道题 | 数论10题 | 一元二次不等式10题 | 随机抽题`;
            warningActive = false;
        }
        
        function checkAnswer() {
            let userAnswer = document.getElementById('answer').value.trim().toLowerCase();
            let correctAnswer = currentQuestion.answer.toLowerCase();
            
            if (userAnswer.includes('/')) {
                const parts = userAnswer.split('/');
                if (parts.length === 2) {
                    userAnswer = (parseFloat(parts[0]) / parseFloat(parts[1])).toString();
                }
            }
            
            if (userAnswer === correctAnswer || Math.abs(parseFloat(userAnswer) - parseFloat(correctAnswer)) < 0.01) {
                document.getElementById('message').className = 'message success';
                document.getElementById('message').innerHTML = '✅ 验证成功！密码是：yuuuunb<br>正在跳转到下载链接...';
                document.getElementById('message').style.display = 'block';
                sessionStorage.setItem('verified', 'true');
                
                setTimeout(function() {
                    window.location.href = 'https://wwbbe.lanzoub.com/iuSWD3opjuxa';
                }, 2000);
            } else {
                document.getElementById('message').className = 'message error';
                document.getElementById('message').innerHTML = '❌ 答案错误，请重新计算或点击"换一题"';
                document.getElementById('message').style.display = 'block';
                
                const input = document.getElementById('answer');
                input.style.border = '2px solid #ff0000';
                setTimeout(() => {
                    input.style.border = '2px solid #00d4ff';
                }, 500);
            }
        }
        
        function resetQuestion() {
            displayQuestion();
            sessionStorage.removeItem('verified');
        }
        
        displayQuestion();
        
        document.getElementById('answer').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
        
        if (sessionStorage.getItem('returnToVerify')) {
            sessionStorage.removeItem('returnToVerify');
        }
    </script>
</body>
</html>
