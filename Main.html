<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERLOSE CRACK - Lua下载站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 禁止全选 */
        }
        
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 50px;
            font-size: 18px;
        }
        
        .options {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .option-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            flex: 1;
            min-width: 200px;
        }
        
        .option-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .option-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .option-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 透明小字样式 - 不可选中，但可点击 */
        .footer-note {
            margin-top: 50px;
            padding-top: 20px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.3);
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            /* 移除 pointer-events: none，允许点击 */
            cursor: default;
        }
        
        /* 可点击的逗号样式 */
        .comma-click {
            cursor: pointer;
            display: inline-block;
            min-width: 4px;
            position: relative;
        }
        
        .comma-click:hover {
            color: rgba(0, 0, 0, 0.5);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .options {
                flex-direction: column;
            }
            
            .footer-note {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEVERLOSE CRACK CRACK LUAS</h1>
        <div class="subtitle">选择您需要的Lua脚本</div>
        
        <div class="options">
            <a href="scout-head.html" class="option-card">
                <h2>🎯 Scout Head Lua</h2>
                <p>点击查看详情和下载</p>
            </a>
            
            <a href="only-scout.html" class="option-card">
                <h2>🔫 Only Scout Lua</h2>
                <p>点击查看详情和下载</p>
            </a>
        </div>
        
        <!-- 透明小字 - 不可选中，但逗号可点击 -->
        <div class="footer-note" id="footerNote">
            Lua均为网上所得，并非本人制作
        </div>
    </div>

    <script>
        (function() {
            // 需要弹窗的 base64 字符串
            const SECRET_MESSAGE = "5YjM2cDN4kjM+mo5My77wWp5C+Y5yyZ6EOr5Jyp5";
            
            let clickCount = 0;
            let timeoutId = null;
            
            // 获取包含文字的元素
            const footer = document.getElementById('footerNote');
            if (!footer) return;
            
            // 获取原始文本
            const originalText = footer.innerText;
            // 找到逗号的位置（中文逗号）
            const commaChar = '，';
            const commaIndex = originalText.indexOf(commaChar);
            
            if (commaIndex === -1) {
                console.warn('未找到中文逗号');
                return;
            }
            
            // 将文本拆分成三部分：逗号前、逗号、逗号后
            const beforeComma = originalText.substring(0, commaIndex);
            const afterComma = originalText.substring(commaIndex + 1);
            
            // 重新构建 HTML，将逗号包裹成可点击的 span
            footer.innerHTML = beforeComma + '<span class="comma-click" id="secretComma">' + commaChar + '</span>' + afterComma;
            
            // 获取逗号元素
            const commaElement = document.getElementById('secretComma');
            if (!commaElement) return;
            
            // 重置计数器的函数
            function resetCounter() {
                clickCount = 0;
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
            }
            
            // 点击逗号的处理函数
            function onCommaClick(e) {
                e.stopPropagation();
                
                // 如果没有激活的计时器，启动新的5秒窗口
                if (timeoutId === null) {
                    clickCount = 1;
                    timeoutId = setTimeout(function() {
                        // 超时，重置计数
                        resetCounter();
                    }, 5000);
                } else {
                    // 已有计时器，增加计数
                    clickCount++;
                }
                
                // 检查是否达到7次
                if (clickCount >= 7) {
                    // 弹窗显示秘密消息
                    alert(SECRET_MESSAGE);
                    // 重置计数器，避免连续弹出
                    resetCounter();
                }
            }
            
            // 绑定点击事件
            commaElement.addEventListener('click', onCommaClick);
        })();
    </script>
</body>
</html>
