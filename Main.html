<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERLOSE CRACK - Lua下载站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 禁止全选 */
        }
        
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        
        h1 {
            font-size: 48px;
            color: #333;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 50px;
            font-size: 18px;
        }
        
        .options {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .option-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            flex: 1;
            min-width: 200px;
        }
        
        .option-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .option-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .option-card p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* 透明小字样式 - 不可选中 */
        .footer-note {
            margin-top: 50px;
            padding-top: 20px;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.3);
            text-align: center;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            pointer-events: none; /* 禁止点击/选中 */
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 32px;
            }
            
            .options {
                flex-direction: column;
            }
            
            .footer-note {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NEVERLOSE CRACK CRACK LUAS</h1>
        <div class="subtitle">选择您需要的Lua脚本</div>
        
        <div class="options">
            <a href="scout-head.html" class="option-card">
                <h2>🎯 Scout Head Lua</h2>
                <p>点击查看详情和下载</p>
            </a>
            
            <a href="only-scout.html" class="option-card">
                <h2>🔫 Only Scout Lua</h2>
                <p>点击查看详情和下载</p>
            </a>
        </div>
        
        <!-- 透明小字 - 不可选中 -->
        <div class="footer-note">
            Lua均为网上所得，并非本人制作
        </div>
    </div>
</body>
</html>
